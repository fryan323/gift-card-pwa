<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gift Cards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Gift Cards</h1>
    <button onclick="openForm()">＋</button>
  </div>

  <!-- SEARCH -->
  <input id="search" placeholder="Search..." oninput="render()">

  <!-- FILTERS -->
  <div class="filters">
    <select id="sort" onchange="render()">
      <option value="default">Added Order</option>
      <option value="desc">Balance ↓</option>
      <option value="asc">Balance ↑</option>
      <option value="alpha">Alphabetical</option>
    </select>

    <label>
      <input type="checkbox" id="hideZero" onchange="render()">
      Hide $0
    </label>
  </div>

  <!-- CARD LIST -->
  <div id="card-list"></div>

  <!-- TOTALS -->
  <div id="totals-view" class="hidden"></div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <button onclick="showTab('cards')">Cards</button>
    <button onclick="showTab('totals')">Totals</button>
  </div>

  <!-- MODAL -->
  <div id="modal">
    <div class="modal-content">

      <h2>Add Card</h2>

      <!-- OCR BUTTON -->
      <input type="file" id="photoInput" accept="image/*" hidden>
      <button onclick="document.getElementById('photoInput').click()">
        📷 Populate from Screenshot
      </button>

      <select id="retailerSelect" onchange="toggleOther()">
        <option>Target</option>
        <option>Walmart</option>
        <option>Best Buy</option>
        <option>Barnes & Noble</option>
        <option>Macy’s</option>
        <option>Scheels</option>
        <option>LEGO</option>
        <option>Giftcards.com</option>
        <option>Other…</option>
      </select>

      <input id="customRetailer" placeholder="Custom retailer" class="hidden">

      <input id="cardNumber" placeholder="Card Number">
      <input id="code" placeholder="Code">
      <input id="discount" placeholder="Discount %" type="number">
      <input id="balance" placeholder="Balance" type="number">

      <button onclick="saveCard()">Save</button>
      <button onclick="closeForm()">Cancel</button>

    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- OCR LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
