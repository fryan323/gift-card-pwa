<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gift Cards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Gift Cards</h1>

  <button onclick="openForm()">+ Add Card</button>

  <input id="search" placeholder="Search..." oninput="render()">

  <div id="card-list"></div>

  <h2>Totals</h2>
  <div id="totals"></div>

  <!-- Modal -->
  <div id="modal" class="hidden">
    <div class="modal-content">
      <h2 id="form-title">Add Card</h2>

      <input id="retailer" placeholder="Retailer">
      <input id="cardNumber" placeholder="Card Number">
      <input id="code" placeholder="Code">
      <input id="discount" placeholder="Discount %">
      <input id="balance" placeholder="Balance">

      <button onclick="saveCard()">Save</button>
      <button onclick="closeForm()">Cancel</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
